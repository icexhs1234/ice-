<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的智能词典</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-b from-blue-50 to-indigo-100 min-h-screen flex items-center justify-center">
    <div class="bg-white p-10 rounded-2xl shadow-xl text-center max-w-xl">
        <h1 class="text-3xl font-bold text-indigo-600 mb-4">我的智能词典</h1>
        <p class="text-gray-600 mb-6">输入一个单词，查看示例（演示版）</p>
        <input id="wordInput" type="text" placeholder="输入单词..."
            class="w-full p-3 border rounded-xl mb-4 focus:outline-none focus:ring-2 focus:ring-indigo-400">
        <button onclick="searchWord()"
            class="bg-indigo-500 text-white px-6 py-3 rounded-xl hover:bg-indigo-600 transition">
            查询
        </button>
        <div id="result" class="mt-6 text-left text-gray-700"></div>
    </div>

    <script>
        function searchWord() {
            const word = document.getElementById("wordInput").value;
            const result = document.getElementById("result");
            if (!word) {
                result.innerHTML = "<p class='text-red-500'>请输入单词</p>";
                return;
            }
            result.innerHTML = `
                <p><strong>${word}</strong></p>
                <p>翻译：这是一个模拟解释</p>
                <p>例句：This is an example sentence using "${word}".</p>
            `;
        }
    </script>
</body>
</html>
